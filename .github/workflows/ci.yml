name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.11/scripts/download-actionlint.bash -o "$RUNNER_TEMP/download-actionlint.bash"
          bash "$RUNNER_TEMP/download-actionlint.bash" 1.7.11 "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - run: bash tests/test-shellcheck.sh
      - run: bash tests/test-repo-contracts.sh
      - run: bash tests/test-entrypoints.sh
      - run: bash tests/test-skills.sh
      - run: bash tests/test-regressions.sh
